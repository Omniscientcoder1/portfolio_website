<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a6e"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="62" height="62" x="1" y="1" rx="13" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5" fill="none"/>
  <!-- T -->
  <text x="6" y="47" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="36" fill="url(#text)">TR</text>
</svg>
